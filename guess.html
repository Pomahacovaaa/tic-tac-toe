<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="icon" type="image/png" href="maslo.png">
    <link href="guess.css" rel="stylesheet">
    </head>

<body >

  <h1>Guess the number</h1>

  <p>Guess a random number between 1 and 100. You have 10 guesses.</p>
<div class="form">
    <label for="guessField">Enter a guess:</label>
    <input
    type="number"
    min="1"
    max="100"
    required
    id="guessField"
    class="guessField"/>
    <input
    type="submit"
    value="Submit guess"
    class="guessSubmit"/>
</div>
<div class="resultParas">
    <p class="guesses"></p>
    <p class="lastResult"></p>
    <p class="lowOrHi"></p>
</div>
<div class="res"><button onclick="location.href='index.html';" class="game--restart">home</button>
</div>

<script type="module" src="guest.js"></script>

</body>
</html>
